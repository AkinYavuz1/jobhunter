search:
  terms:
    - "BI Developer"
    - "Data Analyst"
    - "Data Engineer"
    - "BI Analyst"
    - "Data Developer"
  location: "United Kingdom"
  remote: true
  max_age_days: 7

filters:
  employment_type: permanent
  salary_min: 40000

notification:
  ntfy_priority: default
  max_individual_per_run: 3   # high-obtainability individual pings; rest go to digest only

retention:
  days: 30                    # delete unapplied jobs older than this

cv:
  max_pages: 2
  content_budget:
    profile_sentences: 5
    recent_role_bullets: 6    # NHS, Openwork, Good Energy
    older_role_bullets: 4     # Holloway, 7 Layer, Car2U
    key_projects: 3
    key_project_words: 70
